name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os:     ubuntu-latest
            asset:  tape-${{ github.ref_name }}-linux-amd64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os:     ubuntu-latest
            asset:  tape-${{ github.ref_name }}-linux-arm64.tar.gz
          - target: x86_64-apple-darwin
            os:     macos-latest
            asset:  tape-${{ github.ref_name }}-macos-amd64.tar.gz
          - target: aarch64-apple-darwin
            os:     macos-latest
            asset:  tape-${{ github.ref_name }}-macos-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: install cross compiler (linux-arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
      - run: cargo build --release --target ${{ matrix.target }}
      - name: package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/tape dist/
          cp README.md LICENSE dist/ 2>/dev/null || true
          tar -czf ${{ matrix.asset }} -C dist .
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset }}
          draft: false
          prerelease: false
          generate_release_notes: true
